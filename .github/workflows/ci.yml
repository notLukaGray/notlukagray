name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check (type-check, lint, format)
        run: npm run check

      - name: Boundary lint
        run: npm run lint:boundaries

      - name: Build
        run: npm run build

      - name: Route budget check
        run: npm run check:route-budgets
